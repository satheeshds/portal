<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <meta name="description" content="Lightweight self-hosted portal">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth overlay (shown when not authenticated) -->
    <div id="auth-overlay" class="auth-overlay hidden">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="brand-icon">₹</span>
                <span class="brand-text">Portal</span>
            </div>

            <!-- Login view -->
            <div id="auth-login-view">
                <h2 class="auth-title">Sign in to your account</h2>
                <div id="auth-error" class="auth-error hidden"></div>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input id="login-email" type="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input id="login-password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
                </form>
                <p class="auth-switch">Don't have an account? <a href="#" onclick="showAuthView('register'); return false;">Register</a></p>
            </div>

            <!-- Register view -->
            <div id="auth-register-view" class="hidden">
                <h2 class="auth-title">Create your account</h2>
                <div id="register-error" class="auth-error hidden"></div>
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="register-org">Organisation Name</label>
                        <input id="register-org" type="text" class="form-control" placeholder="Acme Corp" required autocomplete="organization">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input id="register-email" type="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input id="register-password" type="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="register-btn">Create Account</button>
                </form>
                <p class="auth-switch">Already have an account? <a href="#" onclick="showAuthView('login'); return false;">Sign in</a></p>
            </div>
        </div>
    </div>

    <div id="app">
        <nav id="sidebar">
            <div class="brand">
                <span class="brand-icon">₹</span>
                <span class="brand-text">Portal</span>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="nav-link active" data-section="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </a></li>
                <li><a href="#bills" class="nav-link" data-section="bills">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Bills
                </a></li>
                <li><a href="#invoices" class="nav-link" data-section="invoices">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
                    Invoices
                </a></li>
                <li><a href="#payouts" class="nav-link" data-section="payouts">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    Payouts
                </a></li>
                <li><a href="#transactions" class="nav-link" data-section="transactions">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Transactions
                </a></li>
                <li><a href="#accounts" class="nav-link" data-section="accounts">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    Accounts
                </a></li>
                <li><a href="#contacts" class="nav-link" data-section="contacts">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Contacts
                </a></li>
                <li><a href="#recurring-payments" class="nav-link" data-section="recurring-payments">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    Recurring
                </a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="btn btn-ghost btn-sm logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign out
                </button>
            </div>
        </nav>
        <main id="content">
            <div id="section-content"></div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
