services:
  accounting:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - accounting_data:/data
    environment:
      - DB_PATH=/data/accounting.ducklake
      - DUCKLAKE_DATA_PATH=/data/accounting
      - AUTH_USER=admin
      - AUTH_PASS=changeme
      - LOG_LEVEL=info
    restart: unless-stopped

volumes:
  accounting_data:
